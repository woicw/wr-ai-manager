name: build-tauri

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles dmg
            artifact_name: wr-ai-manager-macos-universal-dmg
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - os: windows-latest
            tauri_args: --bundles nsis
            artifact_name: wr-ai-manager-windows-installers
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/zip/*.zip
          - os: ubuntu-22.04
            tauri_args: --bundles appimage
            artifact_name: wr-ai-manager-linux-appimage
            artifact_path: src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate macOS signing secrets
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          missing=0
          for key in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "macos_signing_ready=false" >> "$GITHUB_ENV"
            echo "macOS bundles will be built unsigned because Apple signing secrets are missing. These builds may be blocked by Gatekeeper after download."
          else
            echo "macos_signing_ready=true" >> "$GITHUB_ENV"
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build bundles (signed macOS or standard)
        if: matrix.os != 'macos-latest' || env.macos_signing_ready == 'true'
        run: pnpm tauri build ${{ matrix.tauri_args }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build bundles (unsigned macOS)
        if: matrix.os == 'macos-latest' && env.macos_signing_ready != 'true'
        run: pnpm tauri build ${{ matrix.tauri_args }}

      - name: Package Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $zipDir = "src-tauri/target/release/bundle/zip"
          New-Item -ItemType Directory -Force -Path $zipDir | Out-Null
          $stagingDir = "src-tauri/target/release/bundle/portable/wr-ai-manager-installer"
          Remove-Item -Recurse -Force $stagingDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          $setupExe = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $setupExe) { throw "NSIS setup executable not found" }
          Copy-Item $setupExe.FullName "$stagingDir/$($setupExe.Name)"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "$zipDir/wr-ai-manager-windows-installer.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
