<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 152) rotate(90) scale(392 392)">
      <stop offset="0" stop-color="#10233E" />
      <stop offset="0.46" stop-color="#091425" />
      <stop offset="1" stop-color="#04070D" />
    </radialGradient>

    <radialGradient id="ambient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(262 232) rotate(90) scale(210 248)">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.24" />
      <stop offset="0.48" stop-color="#06B6D4" stop-opacity="0.08" />
      <stop offset="1" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="frame" x1="30" y1="32" x2="474" y2="484" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E0F2FE" stop-opacity="0.2" />
      <stop offset="0.45" stop-color="#67E8F9" stop-opacity="0.08" />
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.16" />
    </linearGradient>

    <linearGradient id="wCore" x1="86" y1="134" x2="426" y2="361" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A5F3FC" />
      <stop offset="0.2" stop-color="#67E8F9" />
      <stop offset="0.52" stop-color="#22D3EE" />
      <stop offset="0.82" stop-color="#0891B2" />
      <stop offset="1" stop-color="#0E7490" />
    </linearGradient>

    <linearGradient id="wHighlight" x1="124" y1="142" x2="300" y2="268" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0FDFF" stop-opacity="0.96" />
      <stop offset="0.38" stop-color="#BAF6FF" stop-opacity="0.66" />
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="scan" x1="120" y1="122" x2="382" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.26" />
      <stop offset="1" stop-color="#67E8F9" stop-opacity="0" />
    </linearGradient>

    <filter id="wGlow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softShadow" x="-16%" y="-16%" width="132%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#02131E" flood-opacity="0.56" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="512" height="512" rx="112" fill="url(#ambient)" />
  <rect x="18" y="18" width="476" height="476" rx="94" stroke="url(#frame)" />

  <g opacity="0.32">
    <path d="M118 154H394" stroke="url(#scan)" stroke-width="3" stroke-linecap="round" />
    <path d="M104 198H356" stroke="url(#scan)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M156 352H408" stroke="url(#scan)" stroke-width="3" stroke-linecap="round" />
  </g>

  <path
    d="M108 136
       L164 356
       L242 206
       L300 316
       L402 154"
    stroke="#22D3EE"
    stroke-width="42"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.22"
    filter="url(#wGlow)"
  />

  <path
    d="M108 136
       L164 356
       L242 206
       L300 316
       L402 154"
    stroke="url(#wCore)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softShadow)"
  />

  <path
    d="M122 146
       L171 335
       L244 219
       L299 302
       L389 163"
    stroke="url(#wHighlight)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <g>
    <circle cx="164" cy="356" r="15" fill="#03131E" stroke="#67E8F9" stroke-width="6" />
    <circle cx="242" cy="206" r="15" fill="#03131E" stroke="#A5F3FC" stroke-width="6" />
    <circle cx="300" cy="316" r="15" fill="#03131E" stroke="#22D3EE" stroke-width="6" />
  </g>

  <g filter="url(#wGlow)">
    <circle cx="256" cy="256" r="18" fill="#9BE7FF" fill-opacity="0.2" />
    <path
      d="M256 236
         L272 252
         L256 268
         L240 252Z"
      fill="#E6FBFF"
      fill-opacity="0.92"
    />
  </g>
</svg>
